services:
  postgres:
    image: postgres:16-alpine
    container_name: elevateflow-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: elevateflow
      POSTGRES_USER: elevateflow
      POSTGRES_PASSWORD: elevateflow_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elevateflow -d elevateflow"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
